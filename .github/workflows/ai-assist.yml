# AI 辅助：需求/风险分析、单测建议、CI 优化建议（仅评论，不阻断流水线）
name: AI Assist

on:
  pull_request:
    types: [opened, synchronize, labeled]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      job:
        description: "Run which job (feasibility | testgen | optimize)"
        required: true
        default: feasibility
        type: choice
        options:
          - feasibility
          - testgen
          - optimize
      pr_number:
        description: "PR number (for manual run, post comment here)"
        required: false
        type: string

concurrency:
  group: ai-assist-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  LLM_API_URL: ${{ vars.LLM_API_URL || 'https://api.openai.com/v1' }}
  LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o-mini' }}

jobs:
  feasibility:
    name: 可行性/风险分析
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'pull_request' && github.event.action != 'labeled') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'feasibility')
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch origin "$BASE_REF"
            MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD)
            DIFF=$(git diff "$MERGE_BASE"...HEAD --no-color 2>/dev/null || git diff HEAD~1 HEAD --no-color)
          else
            DIFF=$(git diff HEAD~1 HEAD --no-color 2>/dev/null || echo "(no diff)")
          fi
          echo "${DIFF::120000}" > diff.txt

      - name: Call LLM - 可行性分析
        id: llm
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          chmod +x .github/scripts/llm-request.sh
          SYS="你是一个代码评审助手。根据 PR 的代码变更，用中文给出简明分析，严格按以下 Markdown 结构回复，不要跑题：
          ## 变更摘要
          ## 潜在风险与影响面
          ## 测试建议
          ## 回滚/兼容性注意点"
          USER="仓库: ${{ github.repository }}，分支: ${{ github.head_ref || 'N/A' }}。请基于以下 diff 分析：
          \`\`\`
          $(cat diff.txt)
          \`\`\`"
          BODY=$(.github/scripts/llm-request.sh "$SYS" "$USER" 2>/dev/null) || BODY="*(LLM 调用失败或未配置 LLM_API_KEY)*"
          echo "<!-- ai-assist-feasibility -->" > body.txt
          echo "" >> body.txt
          echo "$BODY" >> body.txt

      - name: Post PR comment (可行性)
        if: github.event.pull_request.number != '' || github.event.inputs.pr_number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue-number: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          body-path: body.txt
          body-includes: "<!-- ai-assist-feasibility -->"
          edit-mode: replace

  testgen:
    name: 单测建议
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'pull_request' && github.event.label.name == 'ai:tests') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'testgen')
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff and file list
        id: diff
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch origin "$BASE_REF"
            MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD)
            DIFF=$(git diff "$MERGE_BASE"...HEAD --no-color 2>/dev/null || git diff HEAD~1 HEAD --no-color)
            FILES=$(git diff --name-only "$MERGE_BASE"...HEAD 2>/dev/null | tr '\n' ' ')
          else
            DIFF=$(git diff HEAD~1 HEAD --no-color 2>/dev/null || echo "(no diff)")
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | tr '\n' ' ')
          fi
          echo "${DIFF::120000}" > diff.txt
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Call LLM - 单测建议
        id: llm
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          chmod +x .github/scripts/llm-request.sh
          SYS="你是单元测试助手。仓库为 pnpm monorepo：apps/api 用 Vitest，apps/web 用 Vitest + Vue JSX。只针对本次 PR 修改的源码文件，给出可运行的单元测试建议（Vitest，需 mock 外部依赖如 LLM/网络）。只输出测试代码或补丁，用 Markdown 代码块包裹，不要改业务代码。"
          USER="本次变更涉及文件: ${{ steps.diff.outputs.files }}。Diff 如下，请据此生成测试建议：
          \`\`\`
          $(cat diff.txt)
          \`\`\`"
          BODY=$(.github/scripts/llm-request.sh "$SYS" "$USER" 2>/dev/null) || BODY="*(LLM 调用失败或未配置 LLM_API_KEY)*"
          echo "<!-- ai-assist-testgen -->" > body.txt
          echo "" >> body.txt
          echo "$BODY" >> body.txt

      - name: Post PR comment (单测建议)
        if: github.event.pull_request.number != '' || github.event.inputs.pr_number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue-number: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          body-path: body.txt
          body-includes: "<!-- ai-assist-testgen -->"
          edit-mode: replace

  optimize:
    name: CI 优化建议
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: >
      github.event_name == 'workflow_run' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'optimize')
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get CI run timing
        id: timing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id || github.run_id }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
          else
            # use latest CI run on default branch
            RUN_ID=$(gh run list --workflow=ci.yml --limit 1 --json databaseId -q '.[0].databaseId' 2>/dev/null || echo "")
          fi
          if [[ -n "$RUN_ID" ]]; then
            gh run view "$RUN_ID" --json jobs -q '.jobs[] | "\(.name): \(.steps | map(.name + " " + (.completedAt // .startedAt // "?")) | join("; "))"' 2>/dev/null > timing.txt || echo "无法获取 run 详情" > timing.txt
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          else
            echo "无可用 CI 运行记录" > timing.txt
          fi

      - name: Call LLM - CI 优化建议
        id: llm
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          chmod +x .github/scripts/llm-request.sh 2>/dev/null || true
          SYS="你是 CI/CD 优化顾问。根据给出的 CI 运行信息，用中文给出：1) 各步骤耗时占比 2) 可优化点（缓存、并行、拆分 job）3) 具体可执行建议。用 Markdown 格式，简明扼要。"
          USER="CI 运行信息：
          $(cat timing.txt)"
          if [[ -n "${LLM_API_KEY:-}" ]]; then
            BODY=$(.github/scripts/llm-request.sh "$SYS" "$USER" 2>/dev/null) || BODY="*(LLM 调用失败)*"
          else
            BODY="*(未配置 LLM_API_KEY，跳过优化建议)*"
          fi
          echo "<!-- ai-assist-optimize -->" > body.txt
          echo "" >> body.txt
          echo "$BODY" >> body.txt

      - name: Post to PR or Summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_MANUAL: ${{ github.event.inputs.pr_number }}
          PR_FROM_RUN: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          PR_NUM="${PR_MANUAL:-${PR_FROM_RUN}}"
          if [[ -n "$PR_NUM" ]]; then
            gh pr comment "$PR_NUM" --body-file body.txt
          else
            echo "## CI 优化建议" >> "$GITHUB_STEP_SUMMARY"
            tail -n +3 body.txt >> "$GITHUB_STEP_SUMMARY"
          fi
